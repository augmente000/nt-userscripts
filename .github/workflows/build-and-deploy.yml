name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  DEPLOY_BRANCH: dist

jobs:
  build-and-deploy:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check

      - run: pnpm build

      - name: Bump versions for changed scripts
        id: bump
        run: pnpm run bump-versions

      - name: Rebuild after version bumps
        if: steps.bump.outputs.changed == 'true'
        run: pnpm build

      - name: Commit version bumps to master
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/userscripts/*/meta.json
          git commit -m "chore: bump userscript versions [skip ci]"
          git push origin master

      - name: Stage build output
        run: |
          mkdir -p /tmp/deploy
          cp dist/*.user.js /tmp/deploy/

      - name: Publish to deploy branch
        id: deploy
        run: |
          git fetch origin "${DEPLOY_BRANCH}:${DEPLOY_BRANCH}" || true
          if git show-ref --verify --quiet "refs/heads/${DEPLOY_BRANCH}"; then
            git checkout "${DEPLOY_BRANCH}"
          else
            git checkout --orphan "${DEPLOY_BRANCH}"
            git rm -rf . 2>/dev/null || true
          fi

          git clean -fdx
          find . -name "*.user.js" -not -path "./.git/*" -delete
          cp /tmp/deploy/*.user.js .
          printf '%s\n' '*' '!.gitignore' '!*.user.js' > .gitignore

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore *.user.js

          if git diff --staged --quiet; then
            echo "deployed=false" >> "$GITHUB_OUTPUT"
          else
            git commit --no-verify -m "Deploy userscripts from master $(git rev-parse --short master)"
            git push origin "${DEPLOY_BRANCH}"
            echo "deployed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        if: steps.deploy.outputs.deployed == 'true'
        run: |
          {
            echo "### Deployed from \`$(git rev-parse --short master)\`"
            for file in *.user.js; do
              [ -f "$file" ] || continue
              version=$(grep -m1 '^// @version' "$file" | sed 's/^\/\/ @version[[:space:]]*//')
              echo "- \`${file}\` — ${version}"
            done
          } >> "$GITHUB_STEP_SUMMARY"
